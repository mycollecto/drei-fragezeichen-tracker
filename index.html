<script>
var SK='ddd-v1';
var AFFILIATE='httpstwit0cdc-21';
var TOTAL_ALL=368;

var SERIES_META=[
  {key:'haupt',label:'Die drei ???',emoji:'🔍',c1:'#1A237E',c2:'#283593',count:247,status:'aktiv'},
  {key:'kids',label:'Die drei ??? Kids',emoji:'👦',c1:'#1B5E20',c2:'#2E7D32',count:107,status:'aktiv'},
  {key:'rbc',label:'Rocky Beach Crimes',emoji:'🕵',c1:'#B71C1C',c2:'#C62828',count:6,status:'aktiv'},
  {key:'graphic',label:'Graphic Novel',emoji:'🎨',c1:'#4A148C',c2:'#6A1B9A',count:8,status:'aktiv'},
];

var TITLES={
  haupt:{1:'Das Gespensterschloss',2:'Der Super-Papagei',3:'Der Phantomsee',4:'Die schwarze Katze',5:'Der Flüsternde Tod',6:'Das Haus des Schreckens',7:'Die Geisterinsel',8:'Das Skelett aus dem Weltall',9:'Fluch des Rubins',10:'Der geheimnisvolle Wohltäter',11:'Der seltsame Wecker',12:'Die tanzende Teufelsfratze',13:'Das Geheimnis des Zauberers',14:'Der Fluch des Piraten',15:'Schwarze Hand',16:'Das Rätsel des Reiters',17:'Das Geheimnis der brennenden Stadt',18:'Terror aus dem Jenseits',19:'Fluch der Mumie',20:'Das Geheimnis des Drachen',21:'Schrecken aus dem Moor',22:'Im Bann des Voodoo',23:'Die Höhle des Grauens',24:'Auf den Spuren des Erdbebens',25:'Paten des Todes',26:'Ein unheimlicher Gegner',27:'Feuer im Morgenrot',28:'Das Haus der Rätsel',29:'Die Geheimwaffe',30:'Der Zug des Todes',31:'Der Doktor des Todes',32:'Der Hund des Todes',33:'Der Fluss des Grauens',34:'Die Botschaft aus der Höhle',35:'Der Geist des Pythons',36:'Die Gabe des Teufels',37:'Das Monster im Moor',38:'Die Faust des Erdbebens',39:'Schrei der Eule',40:'Die Insel des Grauens',41:'Die Klippe des Todes',42:'Die Geisterbucht',43:'Das Geheimnis der Krachenden Brücke',44:'Der Ritter des Grauens',45:'Die unsichtbare Hand',46:'Das Geheimnis der Toten Stadt',47:'Der Vampir',48:'Der Turm der Verschwundenen',49:'Alarm im Riff',50:'Das Geheimnis der alten Mine',200:'Das Rätsel der Sphinx',237:'Der rote Büffel',238:'Falsche Schuld'},
  kids:{1:'Panik im Paradies',2:'Radio Rocky Beach',3:'Gruft der Piraten',4:'Gefangene des Meeres',5:'Schrei in der Nacht',6:'Feuer und Flamme',7:'Skateboard-Gang',8:'Alarm im Zoo',9:'Rocker-Alarm',10:'Spuk in der Schule'},
  rbc:{1:'Gefährliche Gentlemen',2:'Der blutrote Kondor',3:'Eiskalter Rausch',4:'Mord unter Palmen',5:'Tödliche Törtchen',6:'Unbekannt'},
  graphic:{1:'Der dreiäugige Totenkopf',2:'Das Dorf der Teufel',3:'Das Ritual der Schlangen',4:'Der Goldene Buddha',5:'Das Grab der Könige',6:'Das Rätsel der Rätsel',7:'Der Tempel des Todes',8:'Das schwarze Auge'},
};

var cur={series:'haupt',filter:'alle',search:''};
var read={};
try{read=JSON.parse(localStorage.getItem(SK)||'{}');}catch(e){}
function save(){try{localStorage.setItem(SK,JSON.stringify(read));}catch(e){}}
function rkey(s,n){return s+':'+n;}

function getMeta(key){for(var i=0;i<SERIES_META.length;i++){if(SERIES_META[i].key===key)return SERIES_META[i];}return null;}
function getTitle(series,n){var t=TITLES[series];return (t&&t[n])?t[n]:null;}

function getTotalRead(){var c=0;for(var k in read){if(read[k])c++;}return c;}

function updateTotal(){
  var done=getTotalRead();
  var pct=Math.round(done/TOTAL_ALL*100);
  document.getElementById('totaltext').textContent=done+' / '+TOTAL_ALL;
  document.getElementById('totalfill').style.width=pct+'%';
}

function buildTabs(){
  var row=document.getElementById('tabsrow');
  row.innerHTML='';
  SERIES_META.forEach(function(s){
    var done=0;
    for(var n=1;n<=s.count;n++){if(read[rkey(s.key,n)])done++;}
    var btn=document.createElement('button');
    btn.className='tbtn'+(s.key===cur.series?' on':'');
    btn.innerHTML=s.emoji+' '+s.label+'<span class="tbadge">'+done+'/'+s.count+'</span>';
    btn.setAttribute('data-key',s.key);
    btn.onclick=function(){setSeries(this.getAttribute('data-key'));};
    row.appendChild(btn);
  });
}

function updateHeader(){
  var m=getMeta(cur.series);
  var done=0;
  for(var n=1;n<=m.count;n++){if(read[rkey(cur.series,n)])done++;}
  var pct=Math.round(done/m.count*100);
  var smap={aktiv:'aktiv',eingestellt:'eingestellt',abgeschlossen:'abgeschlossen',pause:'Pause'};
  document.getElementById('htitle').textContent=m.label.toUpperCase();
  document.getElementById('hsub').innerHTML=done+' von '+m.count+' gelesen &middot; '+pct+'%'
    +' <span class="schip s-'+m.status+'">'+smap[m.status]+'</span>';
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('hdr').style.background='linear-gradient(135deg,'+m.c1+','+m.c2+')';
  updateTotal();
}

function setSeries(key){
  cur.series=key;cur.filter='alle';cur.search='';
  document.querySelector('.sbox').value='';
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-f')==='alle');});
  buildTabs();updateHeader();renderGrid();
  setTimeout(function(){var a=document.querySelector('.tbtn.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},50);
}

var ioObs=new IntersectionObserver(function(entries){
  entries.forEach(function(e){if(e.isIntersecting){loadCover(e.target);ioObs.unobserve(e.target);}});
},{rootMargin:'400px'});

function makeCss(n,m){
  var chars=['🔍','📖','🕵','🔦','🗝','💀','🌊','🏔','🕯','⚡','🌙','🎭','🐍','🦅','🔮'];
  var ch=chars[(n-1)%chars.length];
  return '<div class="ccss" style="background:linear-gradient(145deg,'+m.c1+' 0%,'+m.c2+' 100%)">'
    +'<div class="st" style="top:-10%"></div><div class="st" style="top:25%"></div><div class="st" style="top:60%"></div>'
    +'<div class="logo">DIE DREI ???</div>'
    +'<div class="emo">'+ch+'</div>'
    +'<div class="num">'+n+'</div></div>';
}

function loadCover(card){
  var n=parseInt(card.getAttribute('data-n'));
  var series=card.getAttribute('data-s');
  var wrap=card.querySelector('.cwrap');
  var url='covers/'+series+'/'+n+'.jpg';
  var img=new Image();img.className='cimg';
  img.onload=function(){wrap.innerHTML='';wrap.appendChild(img);};
  img.src=url;
}

function toggleRead(series,n){
  var key=rkey(series,n);
  var card=document.querySelector('[data-s="'+series+'"][data-n="'+n+'"]');
  if(read[key]){
    delete read[key];
    if(card){card.classList.remove('read','pop');}
  } else {
    read[key]=true;
    if(card){card.classList.add('read','pop');setTimeout(function(){card.classList.remove('pop');},500);}
    spawnConfetti();
  }
  save();updateHeader();buildTabs();
}

function spawnConfetti(){
  var c=['#FFD700','#1A237E','#4CAF50','#FF9800','#E91E63','#00BCD4'];
  for(var i=0;i<20;i++){
    var d=document.createElement('div');d.className='cdot';
    var sz=6+Math.random()*8;
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;background:'+c[i%c.length]+';left:'+(Math.random()*100)+'%;animation-delay:'+(Math.random()*0.6)+'s;animation-duration:'+(1.2+Math.random())+'s;border-radius:'+(Math.random()>.5?'50%':'3px');
    document.body.appendChild(d);setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},3000);
  }
}

function makeAffiliateUrl(series,n,type){
  var m=getMeta(series);
  var title=getTitle(series,n);
  var q;
  if(type==='audio'){
    q=encodeURIComponent('Die drei Fragezeichen Hörspiel '+n);
  } else {
    if(title) q=encodeURIComponent('Die drei Fragezeichen '+title);
    else q=encodeURIComponent(m.label+' '+n);
  }
  return 'https://www.amazon.de/s?k='+q+'&tag='+AFFILIATE;
}

function renderGrid(){
  var m=getMeta(cur.series);
  var s=cur.search.toLowerCase();
  var grid=document.getElementById('grid');
  var empty=document.getElementById('empty');
  var books=[];
  for(var n=1;n<=m.count;n++){
    var title=getTitle(cur.series,n)||'';
    if(s&&String(n).indexOf(s)<0&&title.toLowerCase().indexOf(s)<0)continue;
    var k=rkey(cur.series,n);
    if(cur.filter==='gelesen'&&!read[k])continue;
    if(cur.filter==='ungelesen'&&read[k])continue;
    books.push(n);
  }
  grid.innerHTML='';
  if(!books.length){empty.style.display='block';return;}
  empty.style.display='none';
  var frag=document.createDocumentFragment();
  books.forEach(function(n){
    var k=rkey(cur.series,n);
    var title=getTitle(cur.series,n)||('??? '+n);
    var card=document.createElement('div');
    card.className='card'+(read[k]?' read':'');
    card.setAttribute('data-n',n);card.setAttribute('data-s',cur.series);
    card.title='???  '+n+': '+title;
    var bookUrl=makeAffiliateUrl(cur.series,n,'book');
    var audioUrl=makeAffiliateUrl(cur.series,n,'audio');
    var showAudio=(cur.series==='haupt'||cur.series==='kids');
    var btnHtml='<div class="btnrow">'
      +'<a class="abtn abtn-book" href="'+bookUrl+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#128722; Buch</a>'
      +(showAudio?'<a class="abtn abtn-audio" href="'+audioUrl+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#127911; H&ouml;rspiel</a>':'')
      +'</div>';
    card.innerHTML='<div class="cbadge">&#10003;</div>'
      +'<div class="cwrap">'+makeCss(n,m)+'</div>'
      +'<div class="ctitle">'+title+'</div>'
      +btnHtml;
    card.addEventListener('click',(function(s,nn){return function(){toggleRead(s,nn);};})(cur.series,n));
    frag.appendChild(card);
    ioObs.observe(card);
  });
  grid.appendChild(frag);
}

function setFilter(btn){
  cur.filter=btn.getAttribute('data-f');
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.toggle('on',b===btn);});
  renderGrid();
}
function setSearch(v){cur.search=v;renderGrid();}

buildTabs();updateHeader();renderGrid();
</script>
