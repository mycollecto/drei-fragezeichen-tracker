name: Cover-Bilder herunterladen

on:
  workflow_dispatch:

jobs:
  download-covers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ordner erstellen
        run: mkdir -p covers/haupt covers/kids covers/rbc covers/graphic

      - name: Cover herunterladen
        run: |
          python3 << 'PYEOF'
          import urllib.request, re, os, time, json

          HEADERS = {
            'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36',
            'Accept': 'application/json',
          }

          def fetch(url):
            req = urllib.request.Request(url, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=20) as r:
              return r.read().decode('utf-8', errors='replace')

          def dl(url, path):
            req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
            with urllib.request.urlopen(req, timeout=20) as r:
              data = r.read()
            if len(data) > 1000:
              open(path, 'wb').write(data)
              return True
            return False

          # Use Fandom API to get images per page title
          BASE_API = 'https://diedreifragezeichen.fandom.com/api.php'

          def get_cover_url(title):
            url = BASE_API + '?action=query&titles=' + urllib.parse.quote(title) + '&prop=pageimages&pithumbsize=400&format=json'
            try:
              data = json.loads(fetch(url))
              pages = data.get('query',{}).get('pages',{})
              for pid, page in pages.items():
                thumb = page.get('thumbnail',{}).get('source','')
                if thumb:
                  return thumb
            except:
              pass
            return None

          import urllib.parse

          COUNTS = {'haupt': 247, 'kids': 107, 'rbc': 6, 'graphic': 8}
          RBC_TITLES = {
            1:'Gefährliche Gentlemen',2:'Der blutrote Kondor',3:'Eiskalter Rausch',
            4:'Mord unter Palmen',5:'Tödliche Törtchen',6:'Unbekannt'
          }
          GFX_TITLES = {
            1:'Die drei ??? – Der dreiäugige Totenkopf (Graphic Novel)',
            2:'Die drei ??? – Das Dorf der Teufel (Graphic Novel)',
            3:'Die drei ??? – Das Ritual der Schlangen (Graphic Novel)',
            4:'Die drei ??? – Der Goldene Buddha (Graphic Novel)',
            5:'Die drei ??? – Das Grab der Könige (Graphic Novel)',
            6:'Die drei ??? – Das Rätsel der Rätsel (Graphic Novel)',
            7:'Die drei ??? – Der Tempel des Todes (Graphic Novel)',
            8:'Die drei ??? – Das schwarze Auge (Graphic Novel)',
          }

          total = 0
          for key, count in COUNTS.items():
            print('\n=== ' + key + ' (' + str(count) + ') ===')
            ok = skip = 0
            for n in range(1, count+1):
              if any(os.path.exists('covers/'+key+'/'+str(n)+'.'+e) for e in ['jpg','jpeg','png','webp']):
                continue
              if key == 'haupt':
                title = 'Die drei ??? und ' if n > 1 else 'Die drei ???'
                title = 'Die drei ??? (Band ' + str(n) + ')'
              elif key == 'kids':
                title = 'Die drei ??? Kids (Band ' + str(n) + ')'
              elif key == 'rbc':
                title = RBC_TITLES.get(n,'')
                if not title: skip+=1; continue
              elif key == 'graphic':
                title = GFX_TITLES.get(n,'')
                if not title: skip+=1; continue

              img_url = get_cover_url(title)
              if img_url:
                ext = 'png' if '.png' in img_url.lower() else 'jpg'
                path = 'covers/'+key+'/'+str(n)+'.'+ext
                try:
                  if dl(img_url, path):
                    ok += 1
                    if ok % 25 == 0: print('  ...' + str(ok))
                  else:
                    skip += 1
                except:
                  skip += 1
              else:
                skip += 1
              time.sleep(0.2)
            print('  ' + key + ': ' + str(ok) + ' OK, ' + str(skip) + ' skip')
            total += ok

          print('\nGesamt: ' + str(total))
          PYEOF

      - name: Committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add covers/
          git diff --staged --quiet && echo "Keine Aenderungen" || (
            COUNT=$(find covers -type f | wc -l)
            git commit -m "Cover aktualisiert ($COUNT Dateien)"
            git push
          )
