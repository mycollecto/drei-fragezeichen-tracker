          GFX = {
            1:'Das Gespensterschloss',2:'Der Karpatenhund',
            3:'Feuermond',4:'Das Feurige Auge',
          }

          SERIES = [
            ('haupt', 247, HAUPT),
            ('kids',  107, KIDS),
            ('rbc',     6, RBC),
            ('graphic', 8, GFX),
          ]

          total = 0
          for key, count, titles in SERIES:
            print('\n=== ' + key + ' ===')
            ok = skip = 0
            for n in range(1, count+1):
              if any(os.path.exists('covers/'+key+'/'+str(n)+'.'+e) for e in ['jpg','jpeg','png','webp']):
                continue
              title = titles.get(n)
              if not title: skip+=1; continue
              img = get_img(title)
              if img:
                ext = 'png' if '.png' in img.lower() else 'jpg'
                try:
                  if dl(img, 'covers/'+key+'/'+str(n)+'.'+ext): ok+=1
                  else: skip+=1
                except: skip+=1
              else:
                skip+=1
              time.sleep(0.15)
            print('  '+key+': '+str(ok)+' OK, '+str(skip)+' skip')
            total += ok
          print('\nGesamt: '+str(total))
          PYEOF

      - name: Committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add covers/
          git diff --staged --quiet && echo "Keine Aenderungen" || (
            COUNT=$(find covers -type f | wc -l)
            git commit -m "Cover aktualisiert ($COUNT Dateien)"
            git push
          )
