name: Cover-Bilder herunterladen

on:
  workflow_dispatch:

jobs:
  download-covers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ordner erstellen
        run: |
          mkdir -p covers/haupt covers/kids covers/rbc covers/graphic


      - name: Cover herunterladen
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, os, time, json

          BASE_API = 'https://diedreifragezeichen.fandom.com/api.php'
          H = {'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'}

          def get_img(title):
            # For File/Datei pages use imageinfo
            if title.startswith('Datei:') or title.startswith('File:'):
              url = BASE_API + '?action=query&titles=' + urllib.parse.quote(title) + '&prop=imageinfo&iiprop=url&format=json'
              try:
                req = urllib.request.Request(url, headers=H)
                with urllib.request.urlopen(req, timeout=15) as r:
                  data = json.loads(r.read())
                for pid, page in data.get('query',{}).get('pages',{}).items():
                  info = page.get('imageinfo', [])
                  if info and info[0].get('url'):
                    return info[0]['url']
              except: pass
              return None
            # For regular pages use pageimages
            url = BASE_API + '?action=query&titles=' + urllib.parse.quote(title) + '&prop=pageimages&pithumbsize=500&format=json'
            try:
              req = urllib.request.Request(url, headers=H)
              with urllib.request.urlopen(req, timeout=15) as r:
                data = json.loads(r.read())
              for pid, page in data.get('query',{}).get('pages',{}).items():
                src = page.get('thumbnail',{}).get('source','')
                if src: return src
            except: pass
            return None

          def get_img_from_wikitext(title):
            # Extract Bild/Image field from wikitext and fetch that file
            try:
              raw_url = 'https://diedreifragezeichen.fandom.com/wiki/' + urllib.parse.quote(title.replace(' ', '_')) + '?action=raw'
              req = urllib.request.Request(raw_url, headers=H)
              with urllib.request.urlopen(req, timeout=15) as r:
                wikitext = r.read().decode('utf-8', errors='replace')
              # Extract Bild or Image field
              m = re.search(r'[Bb]ild\s*=\s*([^\|\}\n]+)', wikitext)
              if not m:
                m = re.search(r'[Ii]mage\s*=\s*([^\|\}\n]+)', wikitext)
              if m:
                fname = m.group(1).strip()
                # Skip screenshots
                if 'screenshot' in fname.lower() or 'Screenshot' in fname:
                  return None
                # Fetch the file via API
                src = get_img('Datei:' + fname)
                if not src:
                  src = get_img('File:' + fname)
                return src
            except: pass
            return None

          def dl(url, path):
            req = urllib.request.Request(url, headers=H)
            with urllib.request.urlopen(req, timeout=20) as r: data = r.read()
            if len(data) > 1000: open(path,'wb').write(data); return True
            return False

