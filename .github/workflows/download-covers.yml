                if not img:
                  for suffix in [' NEU.jpg', 'NEU.jpg', ' neu.jpg', '.jpg', ' NEU.png', '.png']:
                    img = get_img('Datei:' + title + suffix)
                    if img: break
                # Strategy 3: Read raw wikitext and extract Bild= field
                if not img:
