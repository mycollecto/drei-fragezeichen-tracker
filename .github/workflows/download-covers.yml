name: Cover-Bilder herunterladen

on:
  workflow_dispatch:

jobs:
  download-covers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ordner erstellen
        run: mkdir -p covers/haupt covers/kids covers/rbc covers/graphic

      - name: Cover vom Fandom-Wiki scrapen
        run: |
          python3 << 'PYEOF'
          import urllib.request, re, os, time

          BASE = 'https://diedreifragezeichen.fandom.com'
          HEADERS = {
            'Referer': 'https://diedreifragezeichen.fandom.com/',
            'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36',
          }

          SERIES = [
            ('haupt',  247, '/wiki/Kategorie:Fall_der_drei_%3F%3F%3F', r'/wiki/Die_drei_%3F%3F%3F_\(Band_(\d+)\)'),
            ('kids',   107, '/wiki/Kategorie:Fall_der_drei_%3F%3F%3F_Kids', r'/wiki/Die_drei_%3F%3F%3F_Kids.*?_(\d+)'),
            ('rbc',      6, '/wiki/Rocky_Beach_Crimes', r''),
            ('graphic',  8, '/wiki/Graphic_Novel', r''),
          ]

          def fetch(url):
            req = urllib.request.Request(BASE+url if not url.startswith('http') else url, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=20) as r:
              return r.read().decode('utf-8', errors='replace')

          def dl(url, path):
            req = urllib.request.Request(url, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=20) as r:
              data = r.read()
            if len(data) > 1000:
              open(path, 'wb').write(data)
              return True
            return False

          # For each series, get individual book pages and find cover image
          total_ok = 0

          # Strategy: search for each band individually
          for key, count, cat_url, link_pat in SERIES:
            print('\n=== ' + key + ' (' + str(count) + ') ===')
            ok = skip = 0
            for n in range(1, count+1):
              if any(os.path.exists('covers/'+key+'/'+str(n)+'.'+e) for e in ['jpg','jpeg','png','webp']):
                continue
              # Build wiki page URL
              if key == 'haupt':
                page = '/wiki/Die_drei_%3F%3F%3F_(Band_' + str(n) + ')'
              elif key == 'kids':
                page = '/wiki/Die_drei_%3F%3F%3F_Kids_(Band_' + str(n) + ')'
              elif key == 'rbc':
                titles = {1:'Gef%C3%A4hrliche_Gentlemen',2:'Der_blutrote_Kondor',3:'Eiskalter_Rausch',4:'Mord_unter_Palmen',5:'T%C3%B6dliche_T%C3%B6rtchen',6:'Unbekannt'}
                page = '/wiki/' + titles.get(n, '')
                if not page or page == '/wiki/': skip+=1; continue
              elif key == 'graphic':
                titles = {1:'Der_drei%C3%A4ugige_Totenkopf',2:'Das_Dorf_der_Teufel',3:'Das_Ritual_der_Schlangen',4:'Der_Goldene_Buddha',5:'Das_Grab_der_K%C3%B6nige',6:'Das_R%C3%A4tsel_der_R%C3%A4tsel',7:'Der_Tempel_des_Todes',8:'Das_schwarze_Auge'}
                page = '/wiki/' + titles.get(n, '')
                if not page or page == '/wiki/': skip+=1; continue
              try:
                html = fetch(page)
                # Find og:image or first infobox image
                img_m = re.search(r'<meta property="og:image" content="([^"]+)"', html)
                if not img_m:
                  img_m = re.search(r'src="(https://static\.wikia\.nocookie\.net/[^"]+/revision/latest[^"]*)"', html)
                if img_m:
                  img_url = img_m.group(1)
                  # Remove scaling parameters
                  img_url = re.sub(r'/revision/latest/scale-to-width-down/\d+', '/revision/latest', img_url)
                  ext = 'jpg'
                  if '.png' in img_url.lower(): ext = 'png'
                  elif '.webp' in img_url.lower(): ext = 'webp'
                  path = 'covers/' + key + '/' + str(n) + '.' + ext
                  if dl(img_url, path):
                    ok += 1
                    if ok % 25 == 0: print('  ...' + str(ok))
                  else:
                    skip += 1
                else:
                  skip += 1
              except Exception as e:
                skip += 1
              time.sleep(0.15)
            print('  ' + key + ': ' + str(ok) + ' OK, ' + str(skip) + ' skip')
            total_ok += ok

          print('\nGesamt: ' + str(total_ok) + ' Cover')
          PYEOF

      - name: Committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add covers/
          git diff --staged --quiet && echo "Keine Aenderungen" || (
            COUNT=$(find covers -type f | wc -l)
            git commit -m "Cover aktualisiert ($COUNT Dateien)"
            git push
          )
