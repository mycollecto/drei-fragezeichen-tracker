          KIDS = {
            1:'Panik im Paradies',2:'Radio Rocky Beach',3:'Gruft der Piraten',
            4:'Gefangene des Meeres',5:'Schrei in der Nacht',6:'Feuer und Flamme',
            7:'Skateboard-Gang',8:'Alarm im Zoo',9:'Rocker-Alarm',10:'Spuk in der Schule',
          }

          RBC = {
            1:'Gefährliche Gentlemen',2:'Der blutrote Kondor',3:'Eiskalter Rausch',
            4:'Mord unter Palmen',5:'Tödliche Törtchen',
          }

          GFX = {
            1:'Der dreiäugige Totenkopf',2:'Das Dorf der Teufel',
            3:'Das Ritual der Schlangen',4:'Der Goldene Salamander',
            5:'Hotel Bigfoot',6:'Phantom Highway',
            7:'Das Gespensterschloss',8:'Die flüsternde Mumie',
            9:'Die rätselhaften Bilder',
          }

          SERIES = [
            ('haupt', 244, HAUPT),
            ('kids',  109, KIDS),
            ('rbc',     5, RBC),
            ('graphic', 9, GFX),
          ]

          total = 0
          for key, count, titles in SERIES:
            print('\n=== ' + key + ' ===')
            ok = skip = 0
            for n in range(1, count+1):
              if any(os.path.exists('covers/'+key+'/'+str(n)+'.'+e) for e in ['jpg','jpeg','png','webp']):
                continue
              title = titles.get(n)
              if not title: skip+=1; continue
              # For haupt: try with disambiguation first to get exact page
              if key == 'haupt':
                img = get_img(title + ' (Die drei ???)')
                if not img:
                  img = get_img(title)
                # Special cases where Fandom uses different title
                if not img and title == 'Geheimsache Ufo':
                  img = get_img('Geheimakte Ufo (Die drei ???)')
                  if not img: img = get_img('Geheimakte Ufo')
                # Special filenames from Fandom wikitext
                SPECIAL_FILES = {
                  'Der Tag der Toten': 'Der Tag der Toten Screenshot.png',
                  'Der Ruf der Krähen': 'Der Ruf der Krähen 1.png',
                  'Der dreiäugige Schakal': 'Der dreiäugige Schakal.jpg',
