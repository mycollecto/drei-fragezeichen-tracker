          python3 << 'PYEOF'
          import urllib.request, urllib.parse, os, time, json

          BASE_API = 'https://diedreifragezeichen.fandom.com/api.php'
          H = {'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'}

          def get_img(title):
            url = BASE_API + '?action=query&titles=' + urllib.parse.quote(title) + '&prop=pageimages&pithumbsize=500&format=json'
            try:
              req = urllib.request.Request(url, headers=H)
              with urllib.request.urlopen(req, timeout=15) as r:
                data = json.loads(r.read())
              for pid, page in data.get('query',{}).get('pages',{}).items():
                src = page.get('thumbnail',{}).get('source','')
                if src: return src
            except: pass
            return None

          def dl(url, path):
            req = urllib.request.Request(url, headers=H)
            with urllib.request.urlopen(req, timeout=20) as r: data = r.read()
            if len(data) > 1000: open(path,'wb').write(data); return True
            return False

